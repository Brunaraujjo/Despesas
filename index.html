<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Livro-Caixa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --ink:#1C2624;
    --paper:#F3F5F2;
    --card:#FFFFFF;
    --line:#DDE3DD;
    --primary:#2F5D50;
    --primary-dark:#1F4038;
    --amber:#B8842E;
    --amber-bg:#FBF1DF;
    --coral:#B5493A;
    --coral-bg:#FBEAE6;
    --muted:#6B7A73;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}
  body{padding-bottom:84px; -webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Fraunces',serif; margin:0; font-weight:600;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  button{font-family:inherit; cursor:pointer;}
  input,select{font-family:inherit;}

  /* HEADER */
  header{background:var(--primary-dark); color:#F3F5F2; padding:18px 16px 22px; position:sticky; top:0; z-index:20; box-shadow:0 2px 10px rgba(0,0,0,.08);}
  .brand{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .brand-name{font-family:'Fraunces',serif; font-size:19px; font-weight:600; letter-spacing:.2px;}
  .brand-mark{width:26px; height:26px; border-radius:6px; background:var(--amber); display:inline-flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; letter-spacing:-.5px; color:var(--primary-dark); margin-right:8px; font-family:'Inter',sans-serif;}
  .month-nav{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .month-nav button{background:rgba(255,255,255,.12); border:none; color:#F3F5F2; width:38px; height:38px; border-radius:10px; font-size:18px; display:flex; align-items:center; justify-content:center;}
  .month-nav button:active{background:rgba(255,255,255,.22);}
  .month-label{flex:1; text-align:center;}
  .month-label .m{font-family:'Fraunces',serif; font-size:20px; font-weight:600; text-transform:capitalize;}
  .month-label .today-link{display:block; font-size:11px; color:var(--amber); margin-top:2px; opacity:.9;}

  /* LEDGER STRIP (signature element) */
  .ledger{margin:14px 16px 0; background:var(--card); border-radius:var(--radius); padding:14px 14px 10px; box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .ledger-row{display:flex; align-items:center; gap:6px;}
  .ledger-seg{flex:1; text-align:center; padding:4px 2px;}
  .ledger-seg .lbl{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:3px;}
  .ledger-seg .val{font-size:14.5px; font-weight:600;}
  .ledger-arrow{color:var(--line); font-size:14px;}
  .ledger-track{height:6px; border-radius:4px; background:var(--line); margin:12px 0 6px; overflow:hidden; display:flex;}
  .ledger-track .seg-in{background:var(--primary); height:100%;}
  .ledger-track .seg-out{background:var(--coral); height:100%;}
  .balance-final{text-align:center; padding-top:8px; border-top:1px dashed var(--line); margin-top:4px;}
  .balance-final .lbl{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em;}
  .balance-final .val{font-family:'Fraunces',serif; font-size:26px; font-weight:700; margin-top:2px;}
  .val.pos{color:var(--primary-dark);}
  .val.neg{color:var(--coral);}
  .opening-edit{font-size:11.5px; color:var(--amber); text-align:center; margin-top:8px; text-decoration:underline; opacity:.9;}

  /* TABS */
  .tabbar{display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line); z-index:30; padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
  .tab{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; padding:8px 2px; border-radius:10px; color:var(--muted); font-size:10.5px; font-weight:600;}
  .tab .ic{font-size:18px;}
  .tab.active{color:var(--primary-dark);}
  .tab.active .ic{transform:scale(1.05);}

  /* CONTENT */
  main{padding:16px; max-width:640px; margin:0 auto;}
  .section-title{display:flex; align-items:baseline; justify-content:space-between; margin:18px 0 10px;}
  .section-title h2{font-size:16px;}
  .section-title .total{font-size:14px; font-weight:600; color:var(--muted);}
  .card{background:var(--card); border-radius:var(--radius); box-shadow:0 1px 3px rgba(0,0,0,.05); overflow:hidden;}
  .empty{padding:26px 16px; text-align:center; color:var(--muted); font-size:13.5px;}
  .empty b{display:block; color:var(--ink); font-size:14.5px; margin-bottom:4px; font-family:'Fraunces',serif;}

  .day-group{border-bottom:1px solid var(--line);}
  .day-group:last-child{border-bottom:none;}
  .day-head{display:flex; justify-content:space-between; padding:9px 14px; background:#FAFBF9; font-size:11.5px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.03em;}
  .item-row{display:flex; align-items:center; justify-content:space-between; padding:11px 14px; gap:10px; border-top:1px solid var(--line);}
  .day-group .item-row:first-of-type{border-top:none;}
  .item-desc{font-size:14px; flex:1; min-width:0;}
  .item-desc .plat{display:block; font-size:11px; color:var(--muted); margin-top:1px;}
  .item-value{font-weight:600; font-size:14.5px; white-space:nowrap;}
  .item-del{background:none; border:none; color:var(--coral); font-size:17px; padding:2px 6px; opacity:.55;}
  .item-del:active{opacity:1;}

  .platform-tag{display:inline-block; background:var(--amber-bg); color:var(--amber); font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:20px; margin-top:6px;}

  /* ADD FORM (floating sheet) */
  .fab{position:fixed; right:18px; bottom:78px; width:54px; height:54px; border-radius:50%; background:var(--primary); color:#fff; border:none; font-size:26px; box-shadow:0 4px 14px rgba(31,64,56,.35); z-index:25; display:flex; align-items:center; justify-content:center;}
  .fab:active{background:var(--primary-dark);}
  .sheet-overlay{position:fixed; inset:0; background:rgba(20,30,26,.42); z-index:40; display:flex; align-items:flex-end;}
  .sheet{background:var(--card); width:100%; border-radius:20px 20px 0 0; padding:18px 18px calc(18px + env(safe-area-inset-bottom)); max-height:85vh; overflow-y:auto;}
  .sheet h3{font-size:17px; margin-bottom:14px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600;}
  .field input,.field select{width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px; font-size:15px; background:#FCFCFB;}
  .field input:focus,.field select:focus{outline:none; border-color:var(--primary);}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .sheet-actions{display:flex; gap:10px; margin-top:16px;}
  .btn{flex:1; padding:13px; border-radius:11px; border:none; font-weight:700; font-size:14.5px;}
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:active{background:var(--primary-dark);}
  .btn-ghost{background:#F0F1EE; color:var(--muted);}
  .toggle-row{display:flex; gap:8px; margin-bottom:12px;}
  .toggle-opt{flex:1; padding:9px; text-align:center; border-radius:9px; background:#F0F1EE; color:var(--muted); font-size:12.5px; font-weight:700; border:1.5px solid transparent;}
  .toggle-opt.on{background:var(--primary); color:#fff;}

  .status-pill{font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px;}
  .status-pill.pago{background:var(--primary); color:#fff;}
  .status-pill.pendente{background:var(--coral-bg); color:var(--coral);}

  .auth-overlay{position:fixed; inset:0; background:var(--paper); z-index:100; display:flex; align-items:center; justify-content:center; padding:24px;}
  .auth-box{width:100%; max-width:360px;}
  .auth-box .brand-row{display:flex; align-items:center; gap:10px; margin-bottom:22px; justify-content:center;}
  .auth-box h1{font-size:22px;}
  .auth-tabs{display:flex; gap:8px; margin-bottom:18px;}
  .auth-tab{flex:1; text-align:center; padding:10px; border-radius:10px; background:#EAEDE9; color:var(--muted); font-weight:700; font-size:13.5px;}
  .auth-tab.on{background:var(--primary-dark); color:#fff;}
  .auth-error{background:var(--coral-bg); color:var(--coral); font-size:12.5px; padding:9px 12px; border-radius:9px; margin-bottom:12px; display:none;}
  .auth-error.show{display:block;}
  .header-right{display:flex; align-items:center; gap:10px;}
  .logout-btn{background:rgba(255,255,255,.12); border:none; color:#F3F5F2; font-size:11px; padding:6px 10px; border-radius:8px; font-weight:600;}
  .loading{padding:40px; text-align:center; color:var(--muted);}
  .toast{position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:30px; font-size:13px; z-index:60; opacity:0; transition:opacity .25s;}
  .toast.show{opacity:1;}
</style>

const FIRST_MONTH = "2026-07";
const JUNE_CLOSING_BALANCE = 6.19;
const PLATFORMS = ["Outlier","OneForma","Telus","Appen","Premise","Clickworker","uTest","Tryber","Customer In Love","Outro"];
const WEEKDAYS = ["Domingo","Segunda-feira","Terça-feira","Quarta-feira","Quinta-feira","Sexta-feira","Sábado"];
const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

let currentKey = null;
let todayKey = null;
let activeTab = "despesas";
const cache = {};

function pad(n){return String(n).padStart(2,'0');}
function keyOf(y,m){return `${y}-${pad(m)}`;} // m is 1-12
function parseKey(k){const [y,m]=k.split('-').map(Number); return {y,m};}
function prevKey(k){const {y,m}=parseKey(k); return m===1?keyOf(y-1,12):keyOf(y,m-1);}
function nextKey(k){const {y,m}=parseKey(k); return m===12?keyOf(y+1,1):keyOf(y,m+1);}
function keyLessOrEqual(a,b){return a<=b;} // string compare works for YYYY-MM
function daysInMonth(k){const {y,m}=parseKey(k); return new Date(y,m,0).getDate();}
function weekdayOf(k,day){const {y,m}=parseKey(k); return WEEKDAYS[new Date(y,m-1,day).getDay()];}
function monthLabelOf(k){const {y,m}=parseKey(k); return `${MONTHS_PT[m-1]} de ${y}`;}
function fmt(v){
  const n = Number(v)||0;
  return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}
function fmtShort(v){
  const n=Number(v)||0;
  return (n<0?'-':'')+'R$ '+Math.abs(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function uid(){return Math.random().toString(36).slice(2,9);}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>t.classList.remove('show'),1600);
}

function defaultData(key){
  const d = { expenses:[], income:[], remoteWork:[], debts:[], manualOpening:null, rates:{usd:5.3,eur:6.1} };
  if(key === FIRST_MONTH) d.manualOpening = JUNE_CLOSING_BALANCE;
  return d;
}

async function loadMonth(key){
  if(cache[key]) return cache[key];
  try{
    const snap = await db.collection('users').doc(currentUser.uid).collection('months').doc(key).get();
    const data = snap.exists ? snap.data() : defaultData(key);
    data.expenses = data.expenses||[]; data.income = data.income||[]; data.remoteWork = data.remoteWork||[];
    data.debts = data.debts||[]; data.rates = data.rates||{usd:5.3,eur:6.1};
    if(data.manualOpening===undefined) data.manualOpening = null;
    cache[key] = data;
    return data;
  }catch(e){
    const data = defaultData(key);
    cache[key] = data;
    showToast('Sem conexão — mostrando dados locais');
    return data;
  }
}

async function saveMonth(key){
  try{
    await db.collection('users').doc(currentUser.uid).collection('months').doc(key).set(cache[key]);
  }catch(e){
    showToast('Não foi possível salvar na nuvem agora.');
  }
}

function sum(arr){return arr.reduce((s,i)=>s+(Number(i.value)||0),0);}

async function closingBalance(key, seen=new Set()){
  if(key < FIRST_MONTH) return 0;
  if(seen.has(key)) return 0; // safety against loops
  seen.add(key);
  const data = await loadMonth(key);
  let opening = 0;
  if(data.manualOpening !== null && data.manualOpening !== undefined){
    opening = Number(data.manualOpening)||0;
  } else if(key === FIRST_MONTH){
    opening = 0;
  } else {
    opening = await closingBalance(prevKey(key), seen);
  }
  const totalExpenses = sum(data.expenses);
  const totalIncome = sum(data.income);
  const totalRemote = remoteTotalBRL(data);
  return opening + totalIncome + totalRemote - totalExpenses;
}

function remoteTotalBRL(data){
  let total = 0;
  data.remoteWork.forEach(r=>{
    const v = Number(r.value)||0;
    if(r.currency==='USD') total += v*(Number(data.rates.usd)||0);
    else if(r.currency==='EUR') total += v*(Number(data.rates.eur)||0);
    else total += v;
  });
  return total;
}

async function render(){
  document.getElementById('monthLabel').textContent = monthLabelOf(currentKey);
  document.getElementById('todayLink').textContent = currentKey===todayKey ? '' : 'toque para voltar a hoje';
  const data = await loadMonth(currentKey);
  const opening = (data.manualOpening!==null && data.manualOpening!==undefined) ? Number(data.manualOpening) : await closingBalance(prevKey(currentKey));
  const totalExpenses = sum(data.expenses);
  const totalIncome = sum(data.income) + remoteTotalBRL(data);
  const final = opening + totalIncome - totalExpenses;
  renderLedger(opening, totalIncome, totalExpenses, final, data);
  renderTabContent(data);
}

function renderLedger(opening, income, expenses, final, data){
  const maxSeg = Math.max(income, expenses, 1);
  const inPct = Math.min(100,(income/maxSeg)*100);
  const outPct = Math.min(100,(expenses/maxSeg)*100);
  document.getElementById('ledgerCard').innerHTML = `
    <div class="ledger-row">
      <div class="ledger-seg"><span class="lbl">Mês anterior</span><span class="val num">${fmtShort(opening)}</span></div>
      <div class="ledger-arrow">→</div>
      <div class="ledger-seg"><span class="lbl">Entradas</span><span class="val num" style="color:var(--primary-dark)">+${fmtShort(income)}</span></div>
      <div class="ledger-seg"><span class="lbl">Saídas</span><span class="val num" style="color:var(--coral)">-${fmtShort(expenses)}</span></div>
    </div>
    <div class="ledger-track"><div class="seg-in" style="width:${inPct/2}%"></div><div class="seg-out" style="width:${outPct/2}%"></div></div>
    <div class="balance-final">
      <div class="lbl">Saldo atual</div>
      <div class="val num ${final>=0?'pos':'neg'}">${fmt(final)}</div>
    </div>
    <div class="opening-edit" id="editOpening">${(data.manualOpening!==null && data.manualOpening!==undefined) ? 'Saldo inicial ajustado manualmente · editar' : 'Ajustar saldo do mês anterior manualmente'}</div>
  `;
  document.getElementById('editOpening').onclick = ()=>openOpeningEditor(data);
}

function openOpeningEditor(data){
  const overlay = document.createElement('div');
  overlay.className='sheet-overlay';
  overlay.innerHTML = `<div class="sheet">
    <h3>Ajustar saldo do mês anterior</h3>
    <div class="field"><label>Valor manual (R$)</label><input type="number" step="0.01" id="opInput" value="${data.manualOpening!==null && data.manualOpening!==undefined ? data.manualOpening : ''}" placeholder="Deixe em branco para calcular automaticamente"></div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="opCancel">Cancelar</button>
      <button class="btn btn-primary" id="opSave">Salvar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay) overlay.remove();});
  document.getElementById('opCancel').onclick=()=>overlay.remove();
  document.getElementById('opSave').onclick=async()=>{
    const v = document.getElementById('opInput').value;
    data.manualOpening = v===''? null : Number(v);
    await saveMonth(currentKey);
    overlay.remove();
    render();
  };
}

function renderTabContent(data){
  const main = document.getElementById('mainContent');
  if(activeTab==='despesas') main.innerHTML = renderDespesas(data);
  else if(activeTab==='receitas') main.innerHTML = renderReceitas(data);
  else if(activeTab==='trabalho') main.innerHTML = renderTrabalho(data);
  else if(activeTab==='dividas') main.innerHTML = renderDividas(data);
  attachDeleteHandlers(data);
}

function renderDespesas(data){
  const total = sum(data.expenses);
  if(data.expenses.length===0){
    return `<div class="section-title"><h2>Despesas</h2><span class="total num">${fmt(0)}</span></div>
    <div class="card"><div class="empty"><b>Nenhuma despesa lançada</b>Toque em + para adicionar o primeiro gasto do mês.</div></div>`;
  }
  const byDay = {};
  data.expenses.forEach(e=>{ (byDay[e.day]=byDay[e.day]||[]).push(e); });
  const days = Object.keys(byDay).map(Number).sort((a,b)=>a-b);
  let html = `<div class="section-title"><h2>Despesas</h2><span class="total num">${fmt(total)}</span></div><div class="card">`;
  days.forEach(day=>{
    const items = byDay[day];
    const dayTotal = sum(items);
    html += `<div class="day-group"><div class="day-head"><span>Dia ${day} · ${weekdayOf(currentKey,day)}</span><span>${fmtShort(dayTotal)}</span></div>`;
    items.forEach(it=>{
      html += `<div class="item-row"><div class="item-desc">${escapeHtml(it.desc||'Sem descrição')}</div><div class="item-value">${fmtShort(it.value)}</div><button class="item-del" data-list="expenses" data-id="${it.id}">×</button></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

function renderReceitas(data){
  const remoteTotal = remoteTotalBRL(data);
  const outrasTotal = sum(data.income);
  const total = remoteTotal + outrasTotal;
  let html = `<div class="section-title"><h2>Receitas</h2><span class="total num">${fmt(total)}</span></div><div class="card">`;
  html += `<div class="item-row"><div class="item-desc">Trabalho remoto (total do mês)<span class="plat">calculado na aba Trabalho</span></div><div class="item-value">${fmtShort(remoteTotal)}</div></div>`;
  if(data.income.length===0){
    html += `<div class="empty" style="padding:18px 14px;">Nenhuma outra receita lançada este mês.</div>`;
  } else {
    data.income.forEach(it=>{
      html += `<div class="item-row"><div class="item-desc">${escapeHtml(it.desc||'Sem descrição')}</div><div class="item-value">${fmtShort(it.value)}</div><button class="item-del" data-list="income" data-id="${it.id}">×</button></div>`;
    });
  }
  html += `</div>`;
  return html;
}

function renderTrabalho(data){
  const total = remoteTotalBRL(data);
  if(data.remoteWork.length===0){
    return `<div class="section-title"><h2>Trabalho remoto</h2><span class="total num">${fmt(0)}</span></div>
    <div class="card"><div class="empty"><b>Nenhum lançamento</b>Adicione seus ganhos por plataforma tocando em +.</div></div>`;
  }
  const byPlatform = {};
  data.remoteWork.forEach(r=>{(byPlatform[r.platform]=byPlatform[r.platform]||[]).push(r);});
  let html = `<div class="section-title"><h2>Trabalho remoto</h2><span class="total num">${fmt(total)}</span></div>`;
  Object.keys(byPlatform).sort().forEach(plat=>{
    const items = byPlatform[plat];
    let platTotalBRL = 0;
    items.forEach(r=>{
      const v=Number(r.value)||0;
      platTotalBRL += r.currency==='USD'? v*(data.rates.usd||0) : r.currency==='EUR'? v*(data.rates.eur||0) : v;
    });
    html += `<div class="section-title" style="margin-top:14px;"><h2 style="font-size:14px;">${escapeHtml(plat)}</h2><span class="total num">${fmtShort(platTotalBRL)}</span></div><div class="card">`;
    items.forEach(it=>{
      const symbol = it.currency==='USD'?'US$':it.currency==='EUR'?'€':'R$';
      html += `<div class="item-row"><div class="item-desc">${it.desc?escapeHtml(it.desc):'Lançamento do mês'}</div><div class="item-value">${symbol} ${Number(it.value).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><button class="item-del" data-list="remoteWork" data-id="${it.id}">×</button></div>`;
    });
    html += `</div>`;
  });
  html += `<div class="section-title" style="margin-top:16px;"><h2 style="font-size:13px;color:var(--muted);">Cotações usadas</h2></div>
  <div class="card"><div class="item-row"><div class="item-desc">Dólar (USD → BRL)</div><input type="number" step="0.01" value="${data.rates.usd}" style="width:80px;text-align:right;border:1.5px solid var(--line);border-radius:8px;padding:6px;" id="rateUsd"></div>
  <div class="item-row"><div class="item-desc">Euro (EUR → BRL)</div><input type="number" step="0.01" value="${data.rates.eur}" style="width:80px;text-align:right;border:1.5px solid var(--line);border-radius:8px;padding:6px;" id="rateEur"></div></div>`;
  return html;
}

function renderDividas(data){
  if(data.debts.length===0){
    return `<div class="section-title"><h2>Dívidas &amp; cofrinho</h2></div>
    <div class="card"><div class="empty"><b>Nada por aqui</b>Registre valores que você deve ou que devem a você.</div></div>`;
  }
  let html = `<div class="section-title"><h2>Dívidas &amp; cofrinho</h2></div><div class="card">`;
  data.debts.forEach(d=>{
    html += `<div class="item-row"><div class="item-desc">${escapeHtml(d.desc||'Sem descrição')}${d.date?`<span class="plat">${d.date}</span>`:''}</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="status-pill ${d.paid?'pago':'pendente'}" data-toggle-debt="${d.id}">${d.paid?'Pago':'Pendente'}</span>
      <div class="item-value">${fmtShort(d.value)}</div>
    </div>
    <button class="item-del" data-list="debts" data-id="${d.id}">×</button></div>`;
  });
  html += `</div>`;
  return html;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function attachDeleteHandlers(data){
  document.querySelectorAll('.item-del').forEach(btn=>{
    btn.onclick = async ()=>{
      const list = btn.dataset.list, id = btn.dataset.id;
      data[list] = data[list].filter(i=>i.id!==id);
      await saveMonth(currentKey);
      render();
    };
  });
  document.querySelectorAll('[data-toggle-debt]').forEach(el=>{
    el.onclick = async ()=>{
      const id = el.dataset.toggleDebt;
      const d = data.debts.find(x=>x.id===id);
      d.paid = !d.paid;
      await saveMonth(currentKey);
      render();
    };
  });
  const ru = document.getElementById('rateUsd');
  const re = document.getElementById('rateEur');
  if(ru) ru.onchange = async()=>{ data.rates.usd = Number(ru.value)||0; await saveMonth(currentKey); render(); };
  if(re) re.onchange = async()=>{ data.rates.eur = Number(re.value)||0; await saveMonth(currentKey); render(); };
}

// ---- ADD SHEET ----
function openAddSheet(){
  const data = cache[currentKey];
  const overlay = document.createElement('div');
  overlay.className='sheet-overlay';
  const maxDay = daysInMonth(currentKey);

  let formHtml = '';
  if(activeTab==='despesas'){
    formHtml = `<h3>Nova despesa</h3>
      <div class="row2">
        <div class="field"><label>Dia</label><input type="number" id="fDay" min="1" max="${maxDay}" value="${new Date().getDate()<=maxDay?new Date().getDate():1}"></div>
        <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" id="fValue" placeholder="0,00"></div>
      </div>
      <div class="field"><label>Descrição</label><input type="text" id="fDesc" placeholder="Ex: Padaria, Mercado…"></div>`;
  } else if(activeTab==='receitas'){
    formHtml = `<h3>Nova receita</h3>
      <div class="field"><label>Descrição</label><input type="text" id="fDesc" placeholder="Ex: Ajuda família, Meliuz…"></div>
      <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" id="fValue" placeholder="0,00"></div>`;
  } else if(activeTab==='trabalho'){
    formHtml = `<h3>Novo lançamento de trabalho</h3>
      <div class="field"><label>Plataforma</label><select id="fPlatform">${PLATFORMS.map(p=>`<option value="${p}">${p}</option>`).join('')}</select></div>
      <div id="customPlatWrap" class="field" style="display:none;"><label>Nome da plataforma</label><input type="text" id="fCustomPlatform"></div>
      <div class="field"><label>Valor recebido no mês</label><input type="number" step="0.01" id="fValue" placeholder="0,00"></div>
      <div class="field"><label>Moeda</label>
        <div class="toggle-row">
          <div class="toggle-opt on" data-cur="BRL">R$</div>
          <div class="toggle-opt" data-cur="USD">US$</div>
          <div class="toggle-opt" data-cur="EUR">€</div>
        </div>
      </div>
      <div class="field"><label>Observação (opcional)</label><input type="text" id="fDesc" placeholder="Ex: ciclo 15/mês, horas…"></div>`;
  } else if(activeTab==='dividas'){
    formHtml = `<h3>Nova dívida / registro</h3>
      <div class="field"><label>Descrição</label><input type="text" id="fDesc" placeholder="Ex: Empréstimo, cartão…"></div>
      <div class="row2">
        <div class="field"><label>Valor (R$)</label><input type="number" step="0.01" id="fValue" placeholder="0,00"></div>
        <div class="field"><label>Data / vencimento</label><input type="text" id="fDate" placeholder="Ex: 15/07"></div>
      </div>`;
  }

  overlay.innerHTML = `<div class="sheet">${formHtml}
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="addCancel">Cancelar</button>
      <button class="btn btn-primary" id="addSave">Adicionar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay) overlay.remove();});
  document.getElementById('addCancel').onclick=()=>overlay.remove();

  let selectedCurrency = 'BRL';
  if(activeTab==='trabalho'){
    const platSel = document.getElementById('fPlatform');
    platSel.onchange = ()=>{ document.getElementById('customPlatWrap').style.display = platSel.value==='Outro'?'block':'none'; };
    overlay.querySelectorAll('.toggle-opt').forEach(el=>{
      el.onclick = ()=>{
        overlay.querySelectorAll('.toggle-opt').forEach(o=>o.classList.remove('on'));
        el.classList.add('on'); selectedCurrency = el.dataset.cur;
      };
    });
  }

  document.getElementById('addSave').onclick = async ()=>{
    const value = Number(document.getElementById('fValue')?.value);
    if(!value || value<=0){ showToast('Informe um valor válido'); return; }
    if(activeTab==='despesas'){
      const day = Math.min(maxDay, Math.max(1, Number(document.getElementById('fDay').value)||1));
      data.expenses.push({id:uid(), day, desc:document.getElementById('fDesc').value.trim(), value});
    } else if(activeTab==='receitas'){
      data.income.push({id:uid(), desc:document.getElementById('fDesc').value.trim(), value});
    } else if(activeTab==='trabalho'){
      let platform = document.getElementById('fPlatform').value;
      if(platform==='Outro'){ platform = document.getElementById('fCustomPlatform').value.trim() || 'Outro'; }
      data.remoteWork.push({id:uid(), platform, currency:selectedCurrency, desc:document.getElementById('fDesc').value.trim(), value});
    } else if(activeTab==='dividas'){
      data.debts.push({id:uid(), desc:document.getElementById('fDesc').value.trim(), value, date:document.getElementById('fDate').value.trim(), paid:false});
    }
    await saveMonth(currentKey);
    overlay.remove();
    showToast('Adicionado!');
    render();
  };
}

// ---- NAV ----
async function goTo(key){
  currentKey = key;
  await loadMonth(key);
  await render();
}

document.getElementById('prevMonth').onclick = ()=>goTo(prevKey(currentKey));
document.getElementById('nextMonth').onclick = ()=>goTo(nextKey(currentKey));
document.getElementById('todayLink').onclick = ()=>{ if(currentKey!==todayKey) goTo(todayKey); };
document.getElementById('fabAdd').onclick = openAddSheet;
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    render();
  };
});

// ---- AUTH ----
let currentUser = null;
let authMode = 'login';

function setAuthTab(mode){
  authMode = mode;
  document.getElementById('tabLogin').classList.toggle('on', mode==='login');
  document.getElementById('tabSignup').classList.toggle('on', mode==='signup');
  document.getElementById('authSubmit').textContent = mode==='login' ? 'Entrar' : 'Criar conta';
  document.getElementById('authError').classList.remove('show');
}
document.getElementById('tabLogin').onclick = ()=>setAuthTab('login');
document.getElementById('tabSignup').onclick = ()=>setAuthTab('signup');

function authErrorMsg(code){
  const map = {
    'auth/invalid-email':'E-mail inválido.',
    'auth/user-not-found':'Não existe conta com esse e-mail.',
    'auth/wrong-password':'Senha incorreta.',
    'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/email-already-in-use':'Já existe uma conta com esse e-mail. Toque em "Entrar".',
    'auth/weak-password':'A senha precisa ter pelo menos 6 caracteres.',
    'auth/network-request-failed':'Sem conexão com a internet.'
  };
  return map[code] || 'Não foi possível continuar. Tente novamente.';
}

document.getElementById('authSubmit').onclick = async ()=>{
  const email = document.getElementById('authEmail').value.trim();
  const pass = document.getElementById('authPass').value;
  const errEl = document.getElementById('authError');
  errEl.classList.remove('show');
  if(!email || !pass){ errEl.textContent='Preencha e-mail e senha.'; errEl.classList.add('show'); return; }
  try{
    if(authMode==='signup') await auth.createUserWithEmailAndPassword(email, pass);
    else await auth.signInWithEmailAndPassword(email, pass);
  }catch(e){
    errEl.textContent = authErrorMsg(e.code);
    errEl.classList.add('show');
  }
};

document.getElementById('logoutBtn').onclick = ()=>{ auth.signOut(); };

function showApp(){ document.getElementById('authOverlay').style.display='none'; }
function showAuth(){ document.getElementById('authOverlay').style.display='flex'; }

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser = user;
    Object.keys(cache).forEach(k=>delete cache[k]); // limpa cache de sessão anterior
    showApp();
    const now = new Date();
    todayKey = keyOf(now.getFullYear(), now.getMonth()+1);
    currentKey = keyLessOrEqual(FIRST_MONTH, todayKey) ? todayKey : FIRST_MONTH;
    await goTo(currentKey);
  } else {
    currentUser = null;
    showAuth();
  }
});

</script>
